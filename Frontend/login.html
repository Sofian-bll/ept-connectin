<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <form id="login-form">
        <input id="email" type="email" placeholder="Email">
        <input id="password" type="password" placeholder="Mot de passe">
        <button id="login" type="button">Me connecter</button>
        <input type="button" onclick="location.href=`register.html`" value="M'inscrire"/>
        <p id="error"></p>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <script>

        const apiUrl = "http://localhost:8000/api/v1";

         if (localStorage.getItem("token")) {
            window.location.href = "index.html"
        }

        function error(message) {
            const errormsg = document.getElementById("error")
            errormsg.textContent = message
        }

        document.getElementById("login").addEventListener("click", async() => {
        
        const email = document.getElementById("email").value.trim()
        const password = document.getElementById("password").value.trim()
        
        if (!email || !password) {
            error("Les champs sont obligatoires")
            return
        }

        try {
            const response = await axios.post(apiUrl + '/login', {
                email: email,
                password: password,          
            })

            localStorage.setItem("token", response.data.token)
            localStorage.setItem("userName", response.data.user.first_name)
            localStorage.setItem("userId", response.data.user.id)
            window.location.href = "index.html"
        } catch (err) {
            if (err.response.status === 422) {
                const errors = err.response.data.errors
                const first_error = Object.values(errors)[0][0]
                error(first_error)
            } else {
                error("Une erreur est présente, veuillez réessayer")
            }
        }
    })
    </script>
</body>
</html>
