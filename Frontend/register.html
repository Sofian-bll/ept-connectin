<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription</title>
</head>
<body>

    <form id="register-form">
        <input id="nom" type="text" placeholder="Nom">
        <input id="prenom" type="text" placeholder="Prénom">
        <input id="email" type="email" placeholder="Email">
        <input id="password" type="password" placeholder="Mot de passe">
        <input id="confirm-password" type="password" placeholder="Confirmer le mot de passe">
        <button id="register" type="button">Je m'inscris</button>
        <p id="error"></p>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <script>

        if (localStorage.getItem("token")) {
            window.location.href = "index.html"
        }

        function error(message) {
            const errormsg = document.getElementById("error")
            errormsg.textContent = message
        }

        document.getElementById("register").addEventListener("click", async() => {
        
        const prenom = document.getElementById("prenom").value.trim()
        const nom = document.getElementById("nom").value.trim()
        const email = document.getElementById("email").value.trim()
        const password = document.getElementById("password").value.trim()
        const confirm_password = document.getElementById("confirm-password").value.trim()
        
        if (!nom || !prenom || !email || !password) {
            error("Les champs sont obligatoires")
            return
        }

        if (password.length < 8) {
            error("Le mot de passe doit contenir au moins 8 caractères")
            return
        }

        if (confirm_password !== password) {
            error("Le mot de passe ne correspond pas")
            return
        }

        try {
            const response = await axios.post("http://localhost:8000/api/register", {
                last_name: nom,
                first_name: prenom,
                email: email,
                password: password,
                password_confirmation: confirm_password            
            })

            localStorage.setItem("token", response.data.token)
            localStorage.setItem("userName", response.data.user.first_name)
            localStorage.setItem("userId", response.data.user.id)
            window.location.href = "index.html"
        } catch (err) {
            if (err.response.status === 422) {
                const errors = err.response.data.errors
                const first_error = Object.values(errors)[0][0]
                error(first_error)
            } else {
                error("Une erreur est présente, veuillez réessayer")
            }
        }
    })
    </script>
</body>
</html>
