<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d2818;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981" />
      <stop offset="100%" style="stop-color:#34d399" />
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="64" fill="url(#bg)"/>

  <!-- C symbolique - réseau/connexion -->
  <circle cx="256" cy="190" r="100" fill="none" stroke="url(#accent)" stroke-width="8" stroke-dasharray="500" stroke-dashoffset="145" stroke-linecap="round"/>
  <circle cx="224" cy="170" r="6" fill="#10b981"/>
  <circle cx="288" cy="170" r="6" fill="#10b981"/>
  <circle cx="256" cy="210" r="6" fill="#10b981"/>

  <!-- Lignes de connexion -->
  <line x1="224" y1="170" x2="256" y2="210" stroke="#34d399" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="288" y1="170" x2="256" y2="210" stroke="#34d399" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

  <!-- Nom du projet -->
  <text x="256" y="340" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="800" font-size="52" letter-spacing="2" fill="#f0fdfa">Connect'IN</text>

  <!-- Tagline -->
  <text x="256" y="390" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="400" font-size="18" letter-spacing="4" fill="#6ee7b7" opacity="0.8">RÉSEAU SOCIAL ESN</text>

  <!-- Points décoratifs -->
  <circle cx="140" cy="440" r="2" fill="#10b981" opacity="0.3"/>
  <circle cx="200" cy="455" r="1.5" fill="#34d399" opacity="0.2"/>
  <circle cx="312" cy="455" r="1.5" fill="#34d399" opacity="0.2"/>
  <circle cx="372" cy="440" r="2" fill="#10b981" opacity="0.3"/>
</svg>
