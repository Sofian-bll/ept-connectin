<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index</title>
</head>
<body>
    <header>
        <nav id="navbar">
            <div>
                <img alt="" src="">
            </div>

            <div>
                <span id="username"></span>
            </div>

            <div>
                <a href="profil.html">Profil</a>
                <button id="logout" type="button">Déconnexion</button>
            </div>
        </nav>
    </header>

    <main>
        <section id="post">
            <div>
                <input id="post-title" type="text" placeholder="Titre du post">
            </div>

            <div>
                <textarea id="post-content" placeholder="Qu'avez vous à dire ?"></textarea>
            </div>

            <div>
                <input id="post-img" type="file" accept="image/*">
            </div>

            <div>
                <button id="post-publish" type="button">Publier</button>
            </div>

            <p id="post-error"></p>
        </section>

        <section id="feed">

        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <script>
        const apiUrl = "http://localhost:8000/api/v1";
        const token  = localStorage.getItem("token")
        const userId = localStorage.getItem("userId")

        if (!token) {
            window.location.href = "login.html"
        }

        document.getElementById("username").textContent = `${localStorage.getItem("userName")}`

        document.getElementById("logout").addEventListener("click", async () => {
            const token = localStorage.getItem("token")
            try {
                await axios.post(apiUrl + "/logout", {}, {
                    headers: {Authorization: `Bearer ${token}`}
                })
            } catch (err) {
                console.log("Déconnexion impossible", err)
            } finally {
                localStorage.clear()
                window.location.href = "login.html"
            }
        })

        const displayPost = (post) => {
            const card     = document.createElement("div")
            card.id        = `post-${post.id}`
            const image    = post.image_path ? `<img src= {apiUrl} + "storage/${post.image_path}" alt="image">` : ""
            const btnAuth  = post.user_id === userId ? `<button onclick="deletePost(${post.id})">Supprimer</button>` : ""
            card.innerHTML = `
            <p>${post.user.first_name} ${post.user.last_name}</p>
            <p>${post.title}</p>
            <p>${post.content}</p>
            ${image}
            ${btnAuth}`

            document.getElementById("feed").prepend(card)
        }

        const loadPosts = async () => {
            try {
                const response                            = await axios.get(apiUrl + "/posts", {
                    headers: {Authorization: `Bearer ${token}`}
                })
                document.getElementById("feed").innerHTML = ""
                response.data.forEach(post => displayPost(post))
            } catch (err) {
                console.log("Impossible de charger les posts", err)
            }
        }

        loadPosts()

        document.getElementById("post-publish").addEventListener("click", async () => {
            const title   = document.getElementById("post-title").value.trim()
            const content = document.getElementById("post-content").value.trim()
            const img     = document.getElementById("post-img").files[0]

            if (!content) {
                document.getElementById("post-error").textContent = "Le post ne peut pas être vide."
                return
            }
            const formData = new FormData()
            formData.append("title", title)
            formData.append("content", content)
            if (img) {
                formData.append("image", img)
            }
            try {
                const response = await axios.post(apiUrl + "/posts", formData, {
                    headers: {
                        Authorization: `Bearer ${token}`,
                        "Content-Type": "multipart/form-data"
                    }
                })
                displayPost(response.data)
                document.getElementById("post-title").value   = ""
                document.getElementById("post-content").value = ""
                document.getElementById("post-img").value     = ""
            } catch (err) {
                document.getElementById("post-error").textContent = "Publication impossible."
            }
        })

        const deletePost = async (postId) => {
            if (!confirm("Voulez-vous supprimer le post ?"))
                return
            try {
                await axios.delete(apiUrl + `/posts/${postId}`, {
                    headers: {Authorization: `Bearer ${token}`}
                })
                document.getElementById(`post-${postId}`).remove()
            } catch (err) {
                console.log("Impossible de supprimer le post.")
            }
        }
    </script>
</body>
</html>
